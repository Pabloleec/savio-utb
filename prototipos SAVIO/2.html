<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVIO UTB - Centro de Notificaciones Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #1a56db;
            --danger: #dc2626;
            --warning: #ea580c;
            --success: #16a34a;
            --info: #0891b2;
            --bg: #f8fafc;
            --card-bg: rgba(255,255,255,0.9);
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px -12px rgba(0,0,0,0.15);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #eff6ff 0%, #f8fafc 30%, #fef2f2 70%);
            min-height:100vh;
            color:var(--text);
            padding:1.5rem;
            -webkit-font-smoothing:antialiased;
        }

        /* NAVBAR */
        .navbar {
            max-width:1200px;
            margin:0 auto 1.5rem;
            background:var(--card-bg);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            border-radius:var(--radius);
            border:1px solid rgba(255,255,255,0.7);
            box-shadow:var(--shadow);
            padding:0.75rem 1.5rem;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:1rem;
        }
        .logo { font-weight:700; font-size:1.2rem; color:var(--text); display:flex; align-items:center; gap:0.5rem; }
        .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,#3b82f6,#1d4ed8); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:0.8rem; }
        .nav-links { display:flex; gap:0.25rem; list-style:none; flex-wrap:wrap; }
        .nav-links a { text-decoration:none; color:var(--text-secondary); font-weight:500; font-size:0.875rem; padding:0.5rem 0.875rem; border-radius:2rem; transition:var(--transition); }
        .nav-links a:hover, .nav-links a.active { background:#e8f0fe; color:var(--primary); }

        /* NOTIFICATION BELL CON BADGE ANIMADO */
        .notif-trigger-wrapper { position:relative; }
        .notif-trigger {
            width:44px; height:44px; border-radius:50%; border:1.5px solid var(--border); background:white;
            cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition);
            position:relative; color:var(--text-secondary);
        }
        .notif-trigger:hover { border-color:var(--primary); box-shadow:0 0 0 6px rgba(26,86,219,0.1); }
        .notif-trigger.active-bell { animation: bellRing 0.6s ease; border-color:var(--danger); }
        .notif-badge {
            position:absolute; top:-6px; right:-6px; background:var(--danger);
            color:white; font-size:0.7rem; font-weight:700; min-width:22px; height:22px;
            border-radius:11px; display:flex; align-items:center; justify-content:center;
            border:2px solid white; padding:0 5px; box-shadow:0 4px 10px rgba(220,38,38,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.12); }
        }
        @keyframes bellRing {
            0%,100% { transform:rotate(0); }
            25% { transform:rotate(15deg); }
            50% { transform:rotate(-15deg); }
            75% { transform:rotate(8deg); }
        }

        /* MAIN LAYOUT */
        .main-container {
            max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 480px; gap:1.5rem; align-items:start;
        }
        .glass-card {
            background:var(--card-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-radius:var(--radius); border:1px solid rgba(255,255,255,0.7); box-shadow:var(--shadow);
            padding:1.5rem; transition:var(--transition);
        }
        .glass-card:hover { box-shadow:var(--shadow-lg); }

        /* SIDEBAR NOTIFICACIONES */
        .notif-sidebar { display:flex; flex-direction:column; gap:0.75rem; max-height:75vh; overflow-y:auto; }
        .notif-sidebar::-webkit-scrollbar { width:6px; }
        .notif-sidebar::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }

        .notif-card {
            background:white; border-radius:var(--radius-sm); padding:1rem; border:1px solid var(--border);
            cursor:pointer; transition:var(--transition); position:relative; display:flex; gap:0.75rem; align-items:flex-start;
        }
        .notif-card:hover { border-color:var(--primary); box-shadow:var(--shadow); transform:translateY(-2px); }
        .notif-card.unread { border-left:4px solid var(--primary); background:#f8faff; }
        .notif-card.urgent { border-left:4px solid var(--danger); background:#fff5f5; }
        .notif-card.urgent.unread { animation: urgentGlow 2s infinite; }
        @keyframes urgentGlow {
            0%,100% { box-shadow:0 0 0 0 rgba(220,38,38,0); }
            50% { box-shadow:0 0 0 8px rgba(220,38,38,0.1); }
        }
        .notif-icon {
            width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            flex-shrink:0; font-size:1rem;
        }
        .notif-icon.danger { background:#fee2e2; color:#dc2626; }
        .notif-icon.warning { background:#ffedd5; color:#ea580c; }
        .notif-icon.info { background:#e0f2fe; color:#0891b2; }
        .notif-icon.success { background:#dcfce7; color:#16a34a; }
        .notif-body { flex:1; min-width:0; }
        .notif-course { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:#94a3b8; margin-bottom:0.15rem; }
        .notif-title { font-weight:600; font-size:0.9rem; margin-bottom:0.15rem; line-height:1.3; }
        .notif-desc { font-size:0.8rem; color:#475569; margin-bottom:0.25rem; }
        .notif-time { font-size:0.7rem; color:#94a3b8; display:flex; align-items:center; gap:0.25rem; }
        .notif-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; margin-top:0.4rem; }

        /* PANEL DE VISTA PREVIA */
        .preview-panel { display:flex; flex-direction:column; gap:1rem; }
        .preview-header { display:flex; align-items:center; justify-content:space-between; }
        .preview-title { font-size:1.2rem; font-weight:700; }
        .preview-content { flex:1; }
        .preview-placeholder { text-align:center; padding:3rem 1rem; color:#94a3b8; }

        .btn {
            padding:0.5rem 1rem; border-radius:2rem; font-weight:600; font-size:0.8rem; cursor:pointer;
            border:none; transition:var(--transition); font-family:inherit; display:flex; align-items:center; gap:0.375rem;
        }
        .btn-sm { padding:0.35rem 0.75rem; font-size:0.7rem; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-primary:hover { background:#1e40af; transform:translateY(-1px); }
        .btn-outline { background:white; color:var(--primary); border:1.5px solid var(--primary); }
        .btn-outline:hover { background:#e8f0fe; }
        .btn-danger { background:var(--danger); color:white; }
        .btn-danger:hover { background:#b91c1c; }

        @media (max-width:900px) { .main-container { grid-template-columns:1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><div class="logo-icon">S</div>SAVIO UTB</div>
        <ul class="nav-links">
            <li><a href="#">Biblioteca</a></li>
            <li><a href="#">Banner</a></li>
            <li><a href="#">Reglamento</a></li>
            <li><a href="#">Calendario</a></li>
        </ul>
        <div class="notif-trigger-wrapper">
            <button class="notif-trigger active-bell" id="bellBtn" title="Notificaciones">
                <i data-lucide="bell" style="width:20px;height:20px;"></i>
                <span class="notif-badge" id="badgeCount">8</span>
            </button>
        </div>
    </nav>

    <div class="main-container">
        <!-- Lista de notificaciones -->
        <div class="glass-card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
                <h2 style="font-size:1.3rem;font-weight:700;"><i data-lucide="bell" style="width:18px;height:18px;vertical-align:middle;margin-right:0.5rem;"></i>Centro de Notificaciones</h2>
                <div style="display:flex;gap:0.5rem;">
                    <button class="btn btn-outline btn-sm" onclick="filterNotifs('all',this)">Todas</button>
                    <button class="btn btn-outline btn-sm" onclick="filterNotifs('unread',this)">No leídas (4)</button>
                    <button class="btn btn-outline btn-sm" onclick="filterNotifs('urgent',this)">Urgentes (3)</button>
                    <button class="btn btn-primary btn-sm" onclick="markAllRead()">Marcar todas leídas</button>
                </div>
            </div>
            <div class="notif-sidebar" id="notifList">
                <!-- Notificaciones generadas por JS -->
            </div>
        </div>

        <!-- Panel de vista previa -->
        <div class="preview-panel">
            <div class="glass-card" id="previewCard">
                <div class="preview-header">
                    <span class="preview-title">Vista previa</span>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="preview-placeholder">
                        <i data-lucide="inbox" style="width:64px;height:64px;opacity:0.3;"></i>
                        <p style="margin-top:0.5rem;">Selecciona una notificación para ver su contenido completo</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Datos simulados de notificaciones
        const notifications = [
            { id:1, course:'DESARROLLO FRONTEND-2622', title:'CLASE CANCELADA', desc:'El profesor canceló la clase del jueves 15 de mayo. Se reprograma para el lunes 19.', time:'Hace 2 horas', type:'danger', unread:true, urgent:true, priority:'ALTA' },
            { id:2, course:'SISTEMAS Y MODELOS-1780', title:'Notas publicadas', desc:'Las calificaciones del parcial 2 ya están disponibles en Banner.', time:'Hace 5 horas', type:'success', unread:true, urgent:false },
            { id:3, course:'SABER PRO INGLÉS', title:'Simulacro obligatorio', desc:'Debes presentar el simulacro de Speaking antes del 20 de mayo.', time:'Ayer', type:'warning', unread:true, urgent:true },
            { id:4, course:'DESARROLLO FRONTEND-2622', title:'Nueva tarea', desc:'Se ha publicado la Tarea 3: "Diseño Responsivo con Flexbox". Entrega: 25 de mayo.', time:'Ayer', type:'info', unread:true, urgent:false },
            { id:5, course:'Taller Saber-Pro Comunicativas', title:'Recordatorio', desc:'Mañana hay sesión de asesoría grupal a las 3pm. Sala virtual publicada.', time:'Hace 2 días', type:'info', unread:false, urgent:false },
            { id:6, course:'SABER PRO INGLÉS', title:'Cambio de horario', desc:'La clase del viernes se adelanta a las 7:00 am. Confirmar asistencia.', time:'Hace 3 días', type:'warning', unread:false, urgent:true },
            { id:7, course:'DESARROLLO FRONTEND-2622', title:'Entrega revisada', desc:'Tu Proyecto HTML/CSS ha sido calificado: 4.8/5.0', time:'Hace 4 días', type:'success', unread:false, urgent:false },
            { id:8, course:'SISTEMAS Y MODELOS-1780', title:'Material subido', desc:'Diapositivas de la Unidad 4 ya disponibles en el aula virtual.', time:'Hace 5 días', type:'info', unread:false, urgent:false }
        ];

        let currentFilter = 'all';

        function renderNotifications(filter = 'all') {
            currentFilter = filter;
            const list = document.getElementById('notifList');
            let filtered = [...notifications];

            if (filter === 'unread') filtered = notifications.filter(n => n.unread);
            if (filter === 'urgent') filtered = notifications.filter(n => n.urgent);

            // Ordenar: unread primero, urgent primero
            filtered.sort((a,b) => {
                if (a.unread && !b.unread) return -1;
                if (!a.unread && b.unread) return 1;
                if (a.urgent && !b.urgent) return -1;
                if (!a.urgent && b.urgent) return 1;
                return b.id - a.id;
            });

            list.innerHTML = filtered.map(n => `
                <div class="notif-card ${n.unread ? 'unread' : ''} ${n.urgent ? 'urgent' : ''}" 
                     onclick="selectNotification(${n.id})" id="notif-${n.id}">
                    <div class="notif-icon ${n.type}">
                        <i data-lucide="${n.type === 'danger' ? 'alert-circle' : n.type === 'warning' ? 'alert-triangle' : n.type === 'success' ? 'check-circle' : 'info'}" style="width:16px;height:16px;"></i>
                    </div>
                    <div class="notif-body">
                        <div class="notif-course">${n.course} ${n.urgent ? '· URGENTE' : ''}</div>
                        <div class="notif-title">${n.title}</div>
                        <div class="notif-desc">${n.desc.substring(0, 60)}${n.desc.length > 60 ? '...' : ''}</div>
                        <div class="notif-time">
                            <i data-lucide="clock" style="width:12px;height:12px;"></i> ${n.time}
                            ${n.priority ? `· Prioridad: ${n.priority}` : ''}
                        </div>
                    </div>
                    ${n.unread ? '<div class="notif-dot"></div>' : ''}
                </div>
            `).join('');
            lucide.createIcons();
            updateBadge();
        }

        function updateBadge() {
            const unreadCount = notifications.filter(n => n.unread).length;
            const badge = document.getElementById('badgeCount');
            badge.textContent = unreadCount;
            if (unreadCount === 0) badge.style.display = 'none';
            else badge.style.display = 'flex';
        }

        function selectNotification(id) {
            const notif = notifications.find(n => n.id === id);
            if (!notif) return;

            // Marcar como leída
            if (notif.unread) {
                notif.unread = false;
                document.querySelector(`#notif-${id} .notif-dot`)?.remove();
                document.getElementById(`notif-${id}`)?.classList.remove('unread');
                updateBadge();
            }

            // Actualizar panel de vista previa
            const previewContent = document.getElementById('previewContent');
            previewContent.innerHTML = `
                <div style="display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1rem;">
                    <div class="notif-icon ${notif.type}" style="width:48px;height:48px;font-size:1.3rem;display:flex;align-items:center;justify-content:center;">
                        <i data-lucide="${notif.type === 'danger' ? 'alert-circle' : notif.type === 'warning' ? 'alert-triangle' : notif.type === 'success' ? 'check-circle' : 'info'}" style="width:24px;height:24px;"></i>
                    </div>
                    <div>
                        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#94a3b8;">${notif.course}</div>
                        <h3 style="font-size:1.1rem;font-weight:700;margin:0.25rem 0;">${notif.title}</h3>
                        <div style="font-size:0.8rem;color:#64748b;display:flex;align-items:center;gap:0.25rem;">
                            <i data-lucide="clock" style="width:12px;height:12px;"></i> ${notif.time}
                        </div>
                    </div>
                </div>
                <div style="background:#f8fafc;border-radius:12px;padding:1rem;margin:1rem 0;border:1px solid #e2e8f0;">
                    <p style="font-size:0.95rem;line-height:1.6;color:#334155;">${notif.desc}</p>
                </div>
                <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="alert('Abriendo el aula virtual de: ${notif.course}\n(Simulación: Se abriría la página del curso en SAVIO)')">
                        <i data-lucide="external-link" style="width:14px;height:14px;"></i> Ir al curso
                    </button>
                    ${notif.urgent ? `<button class="btn btn-danger" onclick="alert('Confirmación de lectura para: ${notif.title}\n(Simulación: Se enviaría confirmación al profesor)')">
                        <i data-lucide="check-circle" style="width:14px;height:14px;"></i> Confirmar recibido
                    </button>` : ''}
                    <button class="btn btn-outline" onclick="alert('Notificación fijada: ${notif.title}\n(Simulación: La notificación se fijaría al inicio de la lista)')">
                        <i data-lucide="pin" style="width:14px;height:14px;"></i> Fijar
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function filterNotifs(filter, btn) {
            document.querySelectorAll('.btn-outline.btn-sm').forEach(b => b.style.background='white');
            btn.style.background = '#e8f0fe';
            renderNotifications(filter);
        }

        function markAllRead() {
            notifications.forEach(n => n.unread = false);
            renderNotifications(currentFilter);
            document.getElementById('previewContent').innerHTML = `
                <div class="preview-placeholder">
                    <i data-lucide="check-circle" style="width:64px;height:64px;color:#16a34a;"></i>
                    <p style="margin-top:0.5rem;">Todas las notificaciones marcadas como leídas ✓</p>
                </div>`;
            lucide.createIcons();
            alert('Todas las notificaciones han sido marcadas como leídas.');
        }

        // Click en campana
        document.getElementById('bellBtn').addEventListener('click', () => {
            document.getElementById('bellBtn').classList.remove('active-bell');
            alert('Panel de notificaciones activo.\nTienes ' + notifications.filter(n=>n.unread).length + ' notificaciones sin leer.\n(En la versión real, esto desplegaría un dropdown con vista rápida)');
        });

        renderNotifications();
    </script>
</body>
</html>
